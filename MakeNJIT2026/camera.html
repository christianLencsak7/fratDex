<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FratDex | Camera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* The Pi flips the frame server-side (cv2.flip) before drawing text,
         so no CSS transform needed here. Text stays readable. */
      .mjpeg-feed {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body data-page="camera">
    <main class="console">
      <section class="screen">
        <div class="camera-fullscreen">

          <!--
            MJPEG stream from the Pi's FastAPI server.
            The src is set dynamically by app.js using PI_HOST.
            Falls back gracefully if the stream is unavailable.
          -->
          <img
            id="cam-video"
            class="mjpeg-feed"
            alt="Live camera feed"
            onerror="this.style.display='none'; document.getElementById('cam-offline').style.display='flex';"
          />

          <!-- Offline fallback -->
          <div id="cam-offline" class="centered-copy" style="display:none; position:absolute; inset:0; background:#0a0c10; color:#f6f0d8; font-size:8px;">
            Camera offline
          </div>

          <!-- Scan label — updated by JS after API response -->
          <div class="scan-label blink" id="scan-label">Tap to Scan</div>

          <!-- Tap anywhere to scan (or press Space) -->
          <div class="cam-reticle" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="players.js"></script>
    <script src="tasks.js"></script>
    <script src="app.js"></script>
  </body>
</html>
