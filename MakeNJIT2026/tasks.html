<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FratDex | Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="tasks">
    <main class="console">
      <section class="screen">
        <header class="status-bar">
          <span>Tasks</span>
          <span id="task-meta" class="task-count-badge">Completed 0/6</span>
        </header>

        <div class="page-content page-content-tasks">
          <div id="task-list" class="task-list" aria-label="Task list"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="players.js"></script>
    <script src="tasks.js"></script>
    <script src="app.js"></script>
  </body>
</html>
